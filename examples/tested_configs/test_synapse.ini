[groundtruth]
image_path = "/home/emile/simexm-test3/gt_images"
offset = 0, 0, 0
bounds = 40, 100, 100
format = 'image sequence'
gt_cells = 'merged'
isotropic = True
voxel_dim = 100, 100, 100
	[[regions]]
		[[[synapse]]]
		region_path = "/home/emile/simexm-test3/synapse_images"
[labeling]
global_density = 1.0
	[[layer1]]
	fluorophore = 'ATTO425'
	region = 'membrane'
	labeling_density = 1.0
	protein_density = 1e-4
	protein_noise = 0.3
	antibody_amp = 10.0
	single_neuron = False
	[[layer2]]
	fluorophore = 'ATTO550'
	region = 'synapse'
	labeling_density = 1.0
	protein_density = 1e-4
	protein_noise = 0.3
	antibody_amp = 10.0
	single_neuron = False
[expansion]
factor = 4.0
[optics]
type = 'confocal'
numerical_aperture = 1.15
refractory_index = 1.33
focal_plane_depth = 2000
objective_back_aperture = 1.0
exposure_time = 0.1
objective_efficiency = 0.8
detector_efficiency = 0.6
objective_factor = 20.0
pixel_size = 6500
pinhole_radius = 50.0
baseline_noise = 0
	[[channels]]
		[[[channel_1]]]
		laser_wavelength = 425
		laser_power = 50.0
		laser_percentage = 0.25
		laser_filter = 440, 550
		[[[channel_2]]]
		laser_wavelength = 550
		laser_power = 50.0
		laser_percentage = 0.25
		laser_filter = 540, 650
[output]
name = "test_synapse"
path = "/home/emile/simexm-test3/output"
format =  "tiff"
sim_channels = "splitted"
gt_cells = "merged"
gt_region = "cytosol"
